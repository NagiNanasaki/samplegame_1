<div>
<div class="display_menu block_menu" align="center">

  <!-- 閉じるボタン -->
  <div class="menu_item menu_close" style="float:right; margin:20px 10px 0 0">
    <a href="javascript:void(0)">
      <img src="data/others/plugin/thema_nagi_1/image/system/menu_button_close.png">
    </a>
  </div>

  <div style="clear:both"></div>

  <!-- セーブ -->
  <div class="menu_item menu_save">
    <a href="javascript:void(0)">
      <img src="data/others/plugin/thema_nagi_1/image/system/menu_button_save.png">
    </a>
  </div>

  <!-- ロード -->
  <div class="menu_item menu_load">
    <a href="javascript:void(0)">
      <img src="data/others/plugin/thema_nagi_1/image/system/menu_button_load.png">
    </a>
  </div>

  <!-- テキスト消去 -->
  <div class="menu_item menu_window_close">
    <a href="javascript:void(0)">
      <img src="data/others/plugin/thema_nagi_1/image/system/menu_message_close.png">
    </a>
  </div>

  <!-- スキップ -->
  <div class="menu_item menu_skip">
    <a href="javascript:void(0)">
      <img src="data/others/plugin/thema_nagi_1/image/system/menu_button_skip.png">
    </a>
  </div>

  <!-- タイトルに戻る -->
  <div class="menu_item menu_back_title">
    <a href="javascript:void(0)">
      <img src="data/others/plugin/thema_nagi_1/image/system/menu_button_title.png">
    </a>
  </div>

</div>

<!-- 背景画像 -->
<img src="data/others/plugin/thema_nagi_1/image/system/menu_bg.jpg"
     style="z-index:-1; left:0; top:0; width:100%; height:100%; position:absolute;">

<script class="block_menu">
// ホバー時に画像を切り替え（*.png → *2.png）
$(".menu_item").on("mouseenter", function() {
  var $img = $(this).find("img");
  $img.data("orig-src", $img.attr("src"))
      .attr("src", $img.attr("src").replace(".png", "2.png"));
}).on("mouseleave", function() {
  var $img = $(this).find("img");
  $img.attr("src", $img.data("orig-src"));
});
</script>

</div>
